# Render Blueprint — Free Web Service: Flask dashboard + APIs on $PORT + bot daemon thread.
# Use: python main.py serve (see DEPLOY_RENDER.md). GET / = HTML homepage.

services:
  - type: web
    name: trading-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    # -u = unbuffered stdout so Logs tab shows daemon + Telegram status in real time
    startCommand: python -u main.py serve -i 5 -t -m equity crypto
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CAPITAL
        sync: false
