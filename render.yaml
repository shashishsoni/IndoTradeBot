# Render Blueprint — Free Web Service: HTTP on $PORT + bot in background thread.
# Use: python main.py serve (see DEPLOY_RENDER.md).

services:
  - type: web
    name: trading-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py serve -i 5 -t -m equity crypto
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CAPITAL
        sync: false
